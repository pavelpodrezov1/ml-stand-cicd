name: ml-stand-cicd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  train-test-audit-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libcairo2 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Create ML environment
        run: |
          python -m venv .venv-ml
          . .venv-ml/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Train model
        run: |
          . .venv-ml/bin/activate
          python train.py

      - name: Run tests
        run: |
          . .venv-ml/bin/activate
          pytest -q

      - name: Create audit environment
        run: |
          python -m venv .venv-audit
          . .venv-audit/bin/activate
          python -m pip install --upgrade pip
          pip install "git+https://github.com/pavelpodrezov1/pymlsec.git"
          pip install weasyprint

      - name: Run pymlsec audit
        run: |
          . .venv-audit/bin/activate
          pymlsec scan \
            --mode env \
            --python "$GITHUB_WORKSPACE/.venv-ml/bin/python" \
            --output pymlsec-out \
            --fail-on-severity high \
            --insecure-bdu

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pymlsec-report
          path: pymlsec-out/

      - name: Build Docker image
        if: success()
        run: |
          docker build -t ml-stand-cicd:latest .

      - name: Upload Docker build metadata
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-info
          path: |
            Dockerfile
            requirements.txt
            requirements-dev.txt
